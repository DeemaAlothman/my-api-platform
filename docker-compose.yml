services:
  postgres:
    image: postgres:16
    container_name: myapiplatform-postgres
    restart: unless-stopped
    entrypoint: ["/bin/bash", "/docker-custom-entrypoint.sh"]
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: platform
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./apps/postgres/entrypoint.sh:/docker-custom-entrypoint.sh
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: myapiplatform-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@local.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - app-network

  auth:
    build:
      context: .
      dockerfile: apps/auth/Dockerfile
    container_name: myapiplatform-auth
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/platform?schema=auth
      JWT_ACCESS_SECRET: your-jwt-secret-change-in-production
      JWT_REFRESH_SECRET: your-jwt-refresh-secret-change-in-production
      ACCESS_TOKEN_TTL_SECONDS: 900
      REFRESH_TOKEN_TTL_DAYS: 30
      NODE_ENV: production
    ports:
      - "4001:4001"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network

  users:
    build:
      context: .
      dockerfile: apps/users/Dockerfile
    container_name: myapiplatform-users
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/platform?schema=users
      JWT_ACCESS_SECRET: your-jwt-secret-change-in-production
      INTERNAL_SERVICE_TOKEN: replace_me
      NODE_ENV: production
    ports:
      - "4002:4002"
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network

  leave:
    build:
      context: .
      dockerfile: apps/leave/Dockerfile
    container_name: myapiplatform-leave
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/platform?schema=leaves
      JWT_ACCESS_SECRET: your-jwt-secret-change-in-production
      NODE_ENV: production
    ports:
      - "4003:4003"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network

  attendance:
    build:
      context: .
      dockerfile: apps/attendance/Dockerfile
    container_name: myapiplatform-attendance
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/platform?schema=attendance
      JWT_ACCESS_SECRET: your-jwt-secret-change-in-production
      NODE_ENV: production
    ports:
      - "4004:4004"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network

  evaluation:
    build:
      context: .
      dockerfile: apps/evaluation/Dockerfile
    container_name: myapiplatform-evaluation
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/platform?schema=evaluation
      JWT_ACCESS_SECRET: your-jwt-secret-change-in-production
      NODE_ENV: production
    ports:
      - "4005:4005"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network

  requests:
    build:
      context: .
      dockerfile: apps/requests/Dockerfile
    container_name: myapiplatform-requests
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/platform?schema=requests
      JWT_ACCESS_SECRET: your-jwt-secret-change-in-production
      NODE_ENV: production
    ports:
      - "4006:4006"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network

  zkteco:
    build:
      context: .
      dockerfile: apps/zkteco/Dockerfile
    container_name: myapiplatform-zkteco
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/platform?schema=biometric
      ATTENDANCE_SERVICE_URL: http://attendance:4004
      JWT_ACCESS_SECRET: your-jwt-secret-change-in-production
      NODE_ENV: production
    ports:
      - "4007:4007"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network

  jobs:
    build:
      context: .
      dockerfile: apps/jobs/Dockerfile
    container_name: myapiplatform-jobs
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 1.1.1.1
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/platform?schema=jobs
      JWT_ACCESS_SECRET: your-jwt-secret-change-in-production
      VITASYR_API_URL: https://vitaxirpro.com/api/external
      VITASYR_API_KEY: 8d57edc1234696d504eb9d24187bc5d311aedf70a53ec963e8823eff7e05ae3a
      NODE_ENV: production
      MAIL_HOST: smtp.hostinger.com
      MAIL_PORT: "465"
      MAIL_SECURE: "true"
      MAIL_USER: hr@vitaxirpro.com
      MAIL_PASS: hr2026Vita#F
      MAIL_FROM: "فريق الموارد البشرية - فيتاكسير <hr@vitaxirpro.com>"
    ports:
      - "4008:4008"
    networks:
      - app-network

  mail:
    build:
      context: .
      dockerfile: apps/mail/Dockerfile
    container_name: myapiplatform-mail
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/platform?schema=mail
      JWT_ACCESS_SECRET: your-jwt-secret-change-in-production
      NODE_ENV: production
      USERS_SERVICE_URL: http://users:4002
      NOTIFICATIONS_SERVICE_URL: http://users:4002
      INTERNAL_SERVICE_TOKEN: replace_me
      MAX_ATTACHMENT_SIZE_MB: "25"
      ALLOWED_ATTACHMENT_MIME: image/jpeg,image/png,application/pdf,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document
    ports:
      - "4009:4009"
    volumes:
      - mail_uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network

  gateway:
    build:
      context: .
      dockerfile: apps/gateway/Dockerfile
    container_name: myapiplatform-gateway
    restart: unless-stopped
    environment:
      AUTH_SERVICE_URL: http://auth:4001
      USERS_SERVICE_URL: http://users:4002
      LEAVE_SERVICE_URL: http://leave:4003
      ATTENDANCE_SERVICE_URL: http://attendance:4004
      EVALUATION_SERVICE_URL: http://evaluation:4005
      REQUESTS_SERVICE_URL: http://requests:4006
      ZKTECO_SERVICE_URL: http://zkteco:4007
      JOBS_SERVICE_URL: http://jobs:4008
      MAIL_SERVICE_URL: http://mail:4009
      NODE_ENV: production
      PORT: 8000
      ALLOWED_ORIGINS: http://localhost:3000,http://localhost:3012,http://159.198.37.52:3000,http://159.198.37.52:3012
    ports:
      - "8000:8000"
    depends_on:
      - auth
      - users
      - leave
      - requests
      - jobs
      - mail
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  pgdata:
  uploads_data:
  mail_uploads_data:
