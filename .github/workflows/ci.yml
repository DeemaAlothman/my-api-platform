name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'
  JWT_ACCESS_SECRET: test-access-secret-that-is-32-chars-min!!
  JWT_REFRESH_SECRET: test-refresh-secret-that-is-32-chars-min!
  DATABASE_URL: postgresql://test:test@localhost:5432/test

jobs:
  # ─── Lint ────────────────────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Lint all services
        run: |
          for svc in auth users leave attendance evaluation requests gateway; do
            echo "Linting $svc..."
            cd apps/$svc && npm ci && npm run lint && cd ../..
          done

  # ─── Tests ───────────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        service: [auth]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: cd apps/${{ matrix.service }} && npm ci

      - name: Run tests
        run: cd apps/${{ matrix.service }} && npx jest --no-coverage
        env:
          JWT_ACCESS_SECRET: ${{ env.JWT_ACCESS_SECRET }}
          JWT_REFRESH_SECRET: ${{ env.JWT_REFRESH_SECRET }}
          DATABASE_URL: ${{ env.DATABASE_URL }}

  # ─── Build ───────────────────────────────────────────────────────────
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Build all images
        run: docker compose build --parallel
